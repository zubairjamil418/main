<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UK Service Locator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --primary: #111;
    --secondary: #666;
    --accent: #2563eb;
    --bg: #f8f9fa;
    --card: #fff;
    --border: #e5e7eb;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--primary); overflow-x: hidden; }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky; top: 0; z-index: 1000;
    box-shadow: var(--shadow);
  }
  .header-inner { max-width: 600px; margin: 0 auto; }
  .logo { font-size: 20px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }

  .search-box { position: relative; }
  .search-box input {
    width: 100%; padding: 14px 48px 14px 16px; font-size: 16px; border: 2px solid var(--border);
    border-radius: var(--radius); outline: none; transition: border-color 0.2s; font-family: var(--font);
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: var(--accent); color: white; border: none; padding: 10px 18px;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .search-btn:active { opacity: 0.8; }
  .search-btn:disabled { background: var(--secondary); cursor: not-allowed; }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }

  #map { height: 320px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; z-index: 1; }

  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .results-title { font-size: 17px; font-weight: 600; }
  .results-count { font-size: 13px; color: var(--secondary); background: var(--bg); padding: 4px 10px; border-radius: 20px; }

  .location-card {
    background: var(--card); border-radius: var(--radius); padding: 16px;
    margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border);
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .location-card:active { transform: scale(0.98); }
  .location-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

  .loc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .loc-name { font-size: 16px; font-weight: 600; flex: 1; }
  .loc-distance { font-size: 13px; color: var(--accent); font-weight: 600; white-space: nowrap; margin-left: 8px; }
  .loc-address { font-size: 14px; color: var(--secondary); line-height: 1.5; margin-bottom: 8px; }
  .loc-meta { display: flex; gap: 12px; font-size: 12px; color: var(--secondary); }
  .loc-meta span { display: flex; align-items: center; gap: 4px; }
  .loc-tag {
    display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 3px 8px; border-radius: 6px; margin-top: 8px;
  }
  .tag-clinic { background: #dbeafe; color: #1e40af; }
  .tag-store { background: #dcfce7; color: #166534; }
  .tag-office { background: #f3e8ff; color: #7c3aed; }
  .tag-hub { background: #fef3c7; color: #92400e; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--secondary); }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--primary); }

  .loading { text-align: center; padding: 20px; color: var(--secondary); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .popup-content { min-width: 180px; }
  .popup-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .popup-addr { font-size: 12px; color: var(--secondary); }
  .popup-dist { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 4px; }

  .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--secondary); }

  @media (max-width: 480px) {
    #map { height: 260px; }
    .header { padding: 12px; }
    .container { padding: 12px; }
    .location-card { padding: 14px; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>
</head>

    <div class="logo">
      <div class="logo-icon">📍</div>
      UK Service Locator
    </div>
    <div class="search-box">

    </div>
  </div>

      <h3>Find your nearest service</h3>

    </div>
  </div>
</div>

<div class="footer">© 2026 UK Service Locator. Built with OpenStreetMap &amp; postcodes.io</div>

const map = L.map('map', { zoomControl: false }).setView([54.5, -3.5], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

let markers = [];
let userMarker = null;

function toRad(deg) { return deg * Math.PI / 180; }
function haversine(lat1, lng1, lat2, lng2) {
  const R = 3959;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function formatDistance(miles) {
  if (miles < 0.1) return "< 0.1 mi";
  if (miles < 1) return (Math.round(miles * 10) / 10) + " mi";
  return Math.round(miles) + " mi";
}
function getTagClass(type) { return 'loc-tag tag-' + type; }
function getTagLabel(type) {
  const labels = { clinic: 'Clinic', store: 'Store', office: 'Office', hub: 'Service Hub' };
  return labels[type] || type;
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
}

function renderResults(userLat, userLng, sortedLocs) {
  clearMarkers();
  const list = document.getElementById('resultsList');
  const count = document.getElementById('resultsCount');

  if (!sortedLocs.length) {
    list.innerHTML = '<div class="empty-state"><h3>No locations found</h3><p>Try a different postcode.</p></div>';
    count.textContent = '0 found';
    return;
  }

  count.textContent = sortedLocs.length + ' found';

  userMarker = L.marker([userLat, userLng], {
    icon: L.divIcon({
      className: 'user-marker',
      html: '<div style="width:16px;height:16px;background:#2563eb;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8]
    })
  }).addTo(map).bindPopup('<div class="popup-content"><div class="popup-title">You are here</div></div>');

  const bounds = L.latLngBounds([[userLat, userLng]]);
  let html = '';
  sortedLocs.forEach((loc, i) => {
    bounds.extend([loc.lat, loc.lng]);
    const marker = L.marker([loc.lat, loc.lng]).addTo(map)
      .bindPopup('<div class="popup-content"><div class="popup-title">' + loc.name + '</div><div class="popup-addr">' + loc.address + '</div><div class="popup-dist">' + formatDistance(loc.distance) + ' away</div></div>');
    markers.push(marker);

    html += '<div class="location-card" onclick="flyToLocation(' + loc.lat + ', ' + loc.lng + ', ' + i + ')">' +
      '<div class="loc-header"><div class="loc-name">' + loc.name + '</div><div class="loc-distance">' + formatDistance(loc.distance) + '</div></div>' +
      '<div class="loc-address">' + loc.address + '</div>' +
      '<div class="loc-meta"><span>&#128222; ' + loc.phone + '</span><span>&#9200; ' + loc.hours + '</span></div>' +
      '<div class="' + getTagClass(loc.type) + '">' + getTagLabel(loc.type) + '</div></div>';
  });

  list.innerHTML = html;
  map.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
}

function flyToLocation(lat, lng, index) {
  map.flyTo([lat, lng], 15, { duration: 1 });
  setTimeout(() => { markers[index].openPopup(); }, 1000);
}

async function searchLocations() {
  const input = document.getElementById('postcodeInput');
  const btn = document.getElementById('searchBtn');
  const postcode = input.value.trim().toUpperCase().replace(/\s+/g, ' ');

  if (!postcode) { input.focus(); return; }

  btn.disabled = true;
  btn.textContent = '...';
  document.getElementById('resultsList').innerHTML = '<div class="loading"><span class="spinner"></span>Finding locations...</div>';

  try {
    const res = await fetch('https://api.postcodes.io/postcodes/' + encodeURIComponent(postcode.replace(/\s/g, '')));
    const data = await res.json();

    if (!data.result) { throw new Error('Postcode not found'); }

    const userLat = data.result.latitude;
    const userLng = data.result.longitude;

    const sorted = locations.map(loc => ({
      ...loc,
      distance: haversine(userLat, userLng, loc.lat, loc.lng)
    })).sort((a, b) => a.distance - b.distance);

    renderResults(userLat, userLng, sorted);

  } catch (err) {
    document.getElementById('resultsList').innerHTML = '<div class="empty-state"><h3>Postcode not found</h3><p>Please check the postcode and try again. Example: SW1A 1AA</p></div>';
    document.getElementById('resultsCount').textContent = 'Error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Find';
  }
}

document.getElementById('postcodeInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') searchLocations();
});

function showAllLocations() {
  clearMarkers();
  const bounds = L.latLngBounds();
  locations.forEach(loc => {
    bounds.extend([loc.lat, loc.lng]);
    const marker = L.marker([loc.lat, loc.lng]).addTo(map)
      .bindPopup('<div class="popup-content"><div class="popup-title">' + loc.name + '</div><div class="popup-addr">' + loc.address + '</div></div>');
    markers.push(marker);
  });
  map.fitBounds(bounds, { padding: [20, 20] });
}

showAllLocations();
</script>
</body>
</html>
